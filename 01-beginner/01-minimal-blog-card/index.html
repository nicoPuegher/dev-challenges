<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link
            rel="icon"
            type="image/x-icon"
            href="./images/favicon.ico"
        />
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            rel="preload"
            as="image"
            href="./images/cactus.jpg"
            fetchpriority="high"
        />
        <link
            rel="stylesheet"
            href="./styles/globals.css"
        />
        <link
            rel="preload"
            as="font"
            href="https://fonts.gstatic.com/s/sora/v17/xMQbuFFYT72XzQUpDqW1KX4.woff2"
            type="font/woff2"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
            onload="this.onload=null;this.rel='stylesheet'"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Minimal Blog Card</title>
    </head>

    <body>
        <main>
            <article class="card shadow">
                <header class="card__header">
                    <img
                        class="card__image"
                        src="./images/cactus.jpg"
                        alt="A cactus in a pot"
                        width="336"
                        height="152"
                        srcset="./images/cactus-small.jpg 168w, ./images/cactus.jpg 336w"
                        sizes="(max-width: 600px) 168px, 336px"
                    />
                    <span class="card__tag">Design</span>
                </header>

                <div class="card__content">
                    <h2 class="card__title">Embracing Minimalism</h2>
                    <p class="card__text">
                        From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the
                        beauty that lies in simplicity.
                    </p>
                </div>

                <hr class="card__separator" />

                <footer class="card__footer">
                    <span class="card__author">Annie Spratt</span>
                </footer>
            </article>
        </main>
    </body>
</html>
